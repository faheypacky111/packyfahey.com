<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Packy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     oklch(22% 0.05 155);
      --text:   oklch(94% 0.015 88);
      --muted:  oklch(55% 0.04 155);
      --accent: oklch(74% 0.13 88);
      --font-display: 'Instrument Serif', Georgia, serif;
      --font-body:    'DM Sans', Helvetica, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 300;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    #root {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel">

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "headline": "Building brands that have meaningful impact.",
      "subtext": "",
      "lightMode": false,
      "email": "info@homevly.com"
    }/*EDITMODE-END*/;

    const { useTweaks, TweaksPanel, TweakSection, TweakToggle, TweakText } = window;

    function SocialLink({ href, label }) {
      const [hovered, setHovered] = React.useState(false);
      return (
        <a
          href={href}
          target="_blank"
          rel="noopener noreferrer"
          style={{
            fontFamily: 'var(--font-body)',
            fontSize: '15px',
            fontWeight: 400,
            color: hovered ? 'var(--text)' : 'var(--muted)',
            textDecoration: 'none',
            transition: 'color 0.18s',
            letterSpacing: '0.01em'
          }}
          onMouseEnter={() => setHovered(true)}
          onMouseLeave={() => setHovered(false)}
        >
          {label}
        </a>
      );
    }

    function CompanyLink({ href, label, icon }) {
      const [hovered, setHovered] = React.useState(false);
      return (
        <a
          href={href}
          target="_blank"
          rel="noopener noreferrer"
          style={{
            display: 'inline-flex',
            alignItems: 'center',
            gap: '6px',
            fontFamily: 'var(--font-body)',
            fontSize: '15px',
            fontWeight: 400,
            color: hovered ? 'var(--text)' : 'var(--muted)',
            textDecoration: 'none',
            transition: 'color 0.18s'
          }}
          onMouseEnter={() => setHovered(true)}
          onMouseLeave={() => setHovered(false)}
        >
          {icon ? icon : null}
          {label}
          {!icon && (
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <path d="M7 17L17 7M17 7H7M17 7v10" />
            </svg>
          )}
        </a>
      );
    }

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

      React.useEffect(() => {
        const isLight = tweaks.lightMode;
        document.documentElement.style.setProperty('--bg',    isLight ? 'oklch(97% 0.008 90)'   : 'oklch(22% 0.05 155)');
        document.documentElement.style.setProperty('--text',  isLight ? 'oklch(14% 0.02 155)'   : 'oklch(94% 0.015 88)');
        document.documentElement.style.setProperty('--muted', isLight ? 'oklch(52% 0.02 155)'   : 'oklch(55% 0.04 155)');
        document.documentElement.style.setProperty('--accent',isLight ? 'oklch(32% 0.08 155)'   : 'oklch(74% 0.13 88)');
      }, [tweaks.lightMode]);

      return (
        <>
          {/* Page wrapper — full viewport, flex column, space-between */}
          <div style={{
            minHeight: '100vh',
            display: 'flex',
            flexDirection: 'column',
            padding: '48px 56px'
          }}>



            {/* Hero — vertically centered */}
            <main style={{
              flex: 1,
              display: 'flex',
              flexDirection: 'column',
              justifyContent: 'center',
              gap: '0'
            }}>
              <div style={{ maxWidth: '820px' }}>
                <h1 style={{
                  fontFamily: 'var(--font-display)',
                  fontSize: 'clamp(42px, 6.5vw, 88px)',
                  fontWeight: 400,
                  lineHeight: '1.2',
                  letterSpacing: '-0.02em',
                  color: 'var(--text)',
                  textWrap: 'pretty'
                }}>
                  {tweaks.headline}
                </h1>
              </div>
              <div style={{ height: '48px', flexShrink: 0 }}></div>
              {/* Company links row */}
              <div style={{ display: 'flex', gap: '28px', alignItems: 'center', flexWrap: 'wrap' }}>
                <CompanyLink href="https://homevly.com" label="Homevly" />
                <CompanyLink href="https://namevaultx.com" label="NameVaultX" />
                <span style={{ width: '1px', height: '14px', background: 'var(--muted)', opacity: 0.4, flexShrink: 0 }}></span>
                <CompanyLink href="https://x.com/faheypacky" label="@faheypacky" icon={
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                  </svg>
                } />
              </div>
            </main>

            {/* Footer copyright — centered at bottom */}
            <footer style={{ textAlign: 'center' }}>
              <span style={{
                fontFamily: 'var(--font-body)',
                fontSize: '13px',
                color: 'var(--muted)',
                fontWeight: 300
              }}>
                © 2026 Packy
              </span>
            </footer>
          </div>

          <TweaksPanel>
            <TweakSection title="Content">
              <TweakText
                label="Headline"
                value={tweaks.headline}
                onChange={v => setTweak('headline', v)}
              />
              <TweakText
                label="Sub-text"
                value={tweaks.subtext}
                onChange={v => setTweak('subtext', v)}
              />
              <TweakText
                label="Email"
                value={tweaks.email}
                onChange={v => setTweak('email', v)}
              />
            </TweakSection>
            <TweakSection title="Appearance">
              <TweakToggle
                label="Light mode"
                value={tweaks.lightMode}
                onChange={v => setTweak('lightMode', v)}
              />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
